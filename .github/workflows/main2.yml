name: Build MPC-BE-with release

on:
  push:
    tags:
      - 'v*' # Trigger build and release on tag
    paths-ignore:
      - .github/workflows/main.yml
      - '**.txt'
      - '**.md'
      - '**.cmd'
      - '**.bat'
      - '**.manifest.conf'
      - '**.manifest.template'
      - include/Version.h
  pull_request:
    paths-ignore:
      - .github/workflows/main.yml
      - '**.txt'
      - '**.md'
      - '**.cmd'
      - '**.bat'
      - '**.vcxproj.filters'
      - '**.manifest.conf'
      - '**.manifest.template'
      - include/Version.h
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Prepare MSYS
        run: |
          curl -sSL https://github.com/Aleksoid1978/MSYS/raw/main/MSYS_MinGW-w64_GCC_1521_x86-x64.7z -o MSYS.7z
          7z x MSYS.7z -oC:\\MSYS
          echo '@ECHO OFF' > environments.bat
          echo 'SET "MPCBE_MSYS=C:\\MSYS"' >> environments.bat
          echo 'SET "MPCBE_MINGW=C:\\MSYS\\mingw"' >> environments.bat
          .\\update_gcc.bat
        shell: pwsh

      - name: Clean
        run: .\\build.bat Clean All NoWait
        shell: pwsh

      - name: Build MPC-BE
        run: .\\build.bat Build Packages NoWait
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: _bin/Packages/**/MPC-BE*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *installer.zip
            *.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
