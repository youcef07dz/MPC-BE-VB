name: Build MPC-BE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --confirm

      - name: Build mpc-be x86
        run: msbuild mpc-be.sln /t:Build /p:Configuration=Release /p:Platform=Win32 /m:2

      - name: Build mpciconlib x86
        run: msbuild mpciconlib.sln /t:Build /p:Configuration=Release /p:Platform=Win32 /m:2

      - name: Build MPCBEShellExt x86
        run: msbuild MPCBEShellExt.sln /t:Build /p:Configuration=Release /p:Platform=Win32 /m:2

      - name: Build mpc-be x64
        run: msbuild mpc-be.sln /t:Build /p:Configuration=Release /p:Platform=x64 /m:2

      - name: Build mpciconlib x64
        run: msbuild mpciconlib.sln /t:Build /p:Configuration=Release /p:Platform=x64 /m:2

      - name: Build MPCBEShellExt x64
        run: msbuild MPCBEShellExt.sln /t:Build /p:Configuration=Release /p:Platform=x64 /m:2

      - name: Create x86 Installer
        run: iscc /Q /O"_bin" /DWin32Build /DCI_BUILD distrib\mpc-be_setup.iss

      - name: Create x64 Installer
        run: iscc /Q /O"_bin" /DCI_BUILD distrib\mpc-be_setup.iss

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mpc-be-installers
          path: _bin\MPC-BE*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: _bin\MPC-BE*.exe
